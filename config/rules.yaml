# ============================================================
# 规则引擎配置
# 所有阈值均可调参，无需修改代码
# ============================================================

scan_rules:
  # 全局扫描参数 — 以下为文档参考值，各类型独立配置，互不影响
  # min_turnover_amount: 100000000        # 参考: 最小成交额 1亿
  # pct_change_min: 2                     # 参考: 最小涨幅 2%
  # pct_change_max: 7                     # 参考: 最大涨幅 7%
  # super_large_inflow_ratio_min: 20      # 参考: 超大单净流入占比最低 20%
  # consecutive_inflow_days_min: 3        # 参考: 连续净流入最低天数
  # tail_chasing_start_time: "14:30"      # 参考: 尾盘抢筹开始时间
  alert_cooldown_minutes: 30            # 同标的同原因冷却时间（分钟）

  # --- 五类异动信号规则 ---

  # 1. 放量上攻型
  breakout:
    enabled: true
    pct_change_min: 2.0
    pct_change_max: 7.0
    turnover_amount_min: 100000000       # 最低成交额
    volume_ratio_min: 1.5                # 量比 > 1.5
    super_large_inflow_ratio_min: 20     # 超大单净流入占比 > 20%

  # 2. 底部吸筹型
  accumulation:
    enabled: true
    near_250d_low_pct: 15                # 距离 250 日最低价 < 15%
    consecutive_inflow_days_min: 3       # 连续净流入天数 (Phase 2: 从历史数据计算)
    avg_inflow_ratio_min: 10             # 平均净流入占比 > 10%

  # 3. 尾盘抢筹型
  tail_chasing:
    enabled: true
    start_time: "14:30"                  # 开始观察时间
    pct_change_min: 1.0                  # 最低涨幅 (非尾盘窗口)
    pct_change_max: 7.0                  # 最高涨幅 (防止涨停板)
    main_force_ratio_min: 10.0           # 主力净流入占比最低阈值
    tail_turnover_ratio_min: 0.20        # 尾盘成交占全天比 > 20%
    tail_price_bias_min: 0.5             # 尾盘价格偏强 0.5%
    active_buy_ratio_min: 55             # 主动买盘占比 > 55%

  # 4. 事件驱动型
  event_driven:
    enabled: true
    pct_change_min: 3.0                  # 最低涨跌幅 (绝对值)
    turnover_amount_min: 80000000        # 最低成交额
    main_force_ratio_min: 15.0           # 主力净流入占比最低阈值

  # 5. 板块联动型
  sector_linked:
    enabled: true
    min_sector_stocks: 3                 # 板块内至少 N 只股票同步异动
    sector_pct_change_min: 1.5           # 板块平均涨幅 > 1.5%

  # 6. 龙虎榜追踪型
  lhb_tracking:
    enabled: true
    lhb_net_amount_min: 5000             # 龙虎榜净买额最低阈值 (万元)
    retail_lhb_threshold: 20000          # 无机构席位时游资主导的净买额阈值 (万元)
    frequent_board_bonus: true           # 频繁上榜 (>=3次/月) 置信度加成

  # 7. 缺口回补型
  gap_fill:
    enabled: true
    gap_pct_min: 1.5                      # 最低缺口幅度 (%)
    fill_pct_min: 30                      # 最低回补比例 (%)
    volume_ratio_min: 1.2                 # 量比要求
    main_force_ratio_min: 5.0             # 主力参与度最低阈值

  # 8. 大宗交易异动型
  block_trade:
    enabled: true
    trade_amount_min: 5000                # 最低成交额 (万元)
    premium_threshold: 3.0                # 溢价阈值 (%)
    discount_threshold: 5.0               # 折价阈值 (%)

  # 9. 高换手低涨幅型
  high_turnover_low_return:
    enabled: true
    turnover_rate_min: 10.0               # 最低换手率 (%)
    pct_change_max: 2.0                   # 最高涨跌幅 (绝对值 %)
    turnover_amount_min: 100000000        # 最低成交额 (1亿)

  # 10. 盘中急拉/急跌型
  intraday_spike:
    enabled: true
    spike_up_pct_min: 4.0                 # 盘中拉升最低幅度 (%)
    spike_down_pct_min: 4.0               # 盘中下跌最低幅度 (%)
    wide_range_pct_min: 7.0               # 宽幅震荡最低振幅 (%)
    turnover_amount_min: 50000000         # 最低成交额 (5000万)

# --- 技术面共振评分 (Phase 5) ---
# 在规则引擎置信度基础上，根据技术指标进行 ±0.20 的微调
technical_resonance:
  enabled: true
  # MACD
  macd_bullish_bonus: 0.05              # DIF>0 且 hist>0 加分
  macd_bearish_penalty: -0.05           # DIF<0 且 hist<0 扣分
  # RSI
  rsi_oversold_bonus: 0.08              # RSI14<30 加分 (尤其底部吸筹)
  rsi_overbought_penalty: -0.05         # RSI14>80 扣分
  rsi_neutral_bonus: 0.03               # RSI14 30-70 加分
  # 均线
  ma_bullish_alignment_bonus: 0.08      # 多头排列加分
  ma_bearish_alignment_penalty: -0.05   # 空头排列扣分
  ma_golden_cross_bonus: 0.05           # MA5/20 金叉加分
  price_above_ma20_bonus: 0.03          # 价格站上 MA20 加分
  # 布林带
  boll_squeeze_bonus: 0.03              # 带宽<0.1 变盘加分
  # KDJ
  kdj_oversold_bonus: 0.05              # J<0 超卖加分
  # 限制
  max_total_delta: 0.20                 # 最大修正幅度
