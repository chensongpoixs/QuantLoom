# ============================================================
# 规则引擎配置
# 所有阈值均可调参，无需修改代码
# ============================================================

scan_rules:
  # 全局扫描参数
  min_turnover_amount: 100000000        # 最小成交额 1亿
  pct_change_min: 2                     # 最小涨幅 2%
  pct_change_max: 7                     # 最大涨幅 7%
  super_large_inflow_ratio_min: 20      # 超大单净流入占比最低 20%
  consecutive_inflow_days_min: 3        # 连续净流入最低天数
  tail_chasing_start_time: "14:30"      # 尾盘抢筹开始时间
  alert_cooldown_minutes: 30            # 同标的同原因冷却时间（分钟）

  # --- 五类异动信号规则 ---

  # 1. 放量上攻型
  breakout:
    enabled: true
    pct_change_min: 2.0
    pct_change_max: 7.0
    turnover_amount_min: 100000000       # 最低成交额
    volume_ratio_min: 1.5                # 量比 > 1.5
    super_large_inflow_ratio_min: 20     # 超大单净流入占比 > 20%

  # 2. 底部吸筹型
  accumulation:
    enabled: true
    near_250d_low_pct: 15                # 距离 250 日最低价 < 15%
    consecutive_inflow_days_min: 3       # 连续净流入天数 (Phase 2: 从历史数据计算)
    avg_inflow_ratio_min: 10             # 平均净流入占比 > 10%

  # 3. 尾盘抢筹型
  tail_chasing:
    enabled: true
    start_time: "14:30"                  # 开始观察时间
    tail_turnover_ratio_min: 0.20        # 尾盘成交占全天比 > 20%
    tail_price_bias_min: 0.5             # 尾盘价格偏强 0.5%
    active_buy_ratio_min: 55             # 主动买盘占比 > 55%

  # 4. 事件驱动型
  event_driven:
    enabled: true
    pct_change_min: 3.0                  # 最低涨幅
    turnover_amount_min: 80000000        # 最低成交额
    # 事件驱动依赖外部新闻/公告数据 — 通过 AI 归因判断

  # 5. 板块联动型
  sector_linked:
    enabled: true
    min_sector_stocks: 3                 # 板块内至少 N 只股票同步异动
    sector_pct_change_min: 1.5           # 板块平均涨幅 > 1.5%
